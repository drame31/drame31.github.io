<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeatForge Ultimate | Drum Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Anybody:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#08080c;--bg2:#0e0e14;--bg3:#14141e;--bg4:#1a1a28;
    --border:rgba(255,255,255,0.05);--border-h:rgba(255,100,50,0.3);
    --fire:#ff6432;--ember:#ff8c00;--gold:#ffd033;--cyan:#00e5ff;
    --purple:#b44dff;--green:#00ff88;--red:#ff2d55;--pink:#ff6b9d;
    --text:#d4d4e0;--text-dim:#5a5a72;--text-bright:#f0f0f8;
    --fire-glow:rgba(255,100,50,0.15);
    --theme-glow:var(--fire);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Oxanium',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.5s}

/* THEMES */
body.theme-retro{--bg:#1a0a2e;--bg2:#220e3a;--bg3:#2a1248;--bg4:#341656;--fire:#ff00ff;--ember:#ff44cc;--gold:#ffff00;--cyan:#00ffff;--purple:#ff00ff;--green:#00ff44;--border:rgba(255,0,255,0.08);--fire-glow:rgba(255,0,255,0.15);--theme-glow:#ff00ff}
body.theme-matrix{--bg:#000800;--bg2:#001200;--bg3:#001a00;--bg4:#002200;--fire:#00ff41;--ember:#00cc33;--gold:#33ff66;--cyan:#00ff41;--purple:#00aa22;--green:#00ff41;--border:rgba(0,255,65,0.08);--fire-glow:rgba(0,255,65,0.15);--theme-glow:#00ff41;--text:#00ff41;--text-dim:#006622;--text-bright:#66ff88}
body.theme-vapor{--bg:#1a0033;--bg2:#2a004d;--bg3:#330066;--bg4:#440077;--fire:#ff71ce;--ember:#ff9de2;--gold:#fffb96;--cyan:#01cdfe;--purple:#b967ff;--green:#05ffa1;--border:rgba(185,103,255,0.1);--fire-glow:rgba(255,113,206,0.15);--theme-glow:#ff71ce}

.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,100,50,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,100,50,0.012) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;transition:all 0.5s}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(255,100,50,0.05),transparent 70%);pointer-events:none;transition:all 0.5s}

/* PARTY FLASH */
.party-flash{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.1s}
.party-flash.active{opacity:1;animation:flashPulse 0.15s ease-out}
@keyframes flashPulse{0%{opacity:0.3}100%{opacity:0}}

/* PARTY PARTICLES */
.party-particle{position:fixed;pointer-events:none;z-index:99;border-radius:50%;animation:partyFly 1s ease-out forwards}
@keyframes partyFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}

/* COMBO */
.combo-display{position:fixed;top:80px;right:20px;z-index:50;text-align:right;pointer-events:none}
.combo-count{font-family:'Anybody',sans-serif;font-size:2.2rem;font-weight:900;color:var(--fire);text-shadow:0 0 20px var(--fire-glow);transition:all 0.2s}
.combo-label{font-family:'Press Start 2P',monospace;font-size:0.65rem;color:var(--gold);text-shadow:0 0 10px rgba(255,208,51,0.4);opacity:0;transition:all 0.3s;transform:translateY(5px)}
.combo-label.show{opacity:1;transform:translateY(0)}
.combo-text{font-family:'Press Start 2P',monospace;font-size:0.9rem;position:absolute;right:0;white-space:nowrap;animation:comboFly 0.8s ease-out forwards;pointer-events:none}
@keyframes comboFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.5)}}

/* TOPBAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:rgba(14,14,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--fire),transparent);opacity:0.3}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--fire),var(--ember));display:flex;align-items:center;justify-content:center;font-size:0.9rem;box-shadow:0 0 15px var(--fire-glow)}
.brand-name{font-family:'Anybody',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--fire),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-dim);letter-spacing:2px}
.top-btns{display:flex;gap:6px;align-items:center}
.top-link,.theme-btn{font-size:0.6rem;letter-spacing:1.5px;color:var(--text-dim);text-decoration:none;padding:4px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:all 0.3s;background:transparent;font-family:'Oxanium',sans-serif}
.top-link:hover,.theme-btn:hover,.theme-btn.active{border-color:var(--fire);color:var(--fire)}

.main{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:12px 14px 30px}

/* TRANSPORT */
.transport{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.tg{display:flex;align-items:center;gap:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);font-family:'Oxanium',sans-serif;font-size:0.68rem;font-weight:600;cursor:pointer;transition:all 0.25s;letter-spacing:1px}
.btn:hover{border-color:var(--fire);color:var(--fire);transform:translateY(-1px)}
.btn.active{background:linear-gradient(135deg,var(--fire),var(--ember));color:#fff;border-color:transparent;box-shadow:0 0 15px var(--fire-glow)}
.btn-play{width:38px;height:38px;padding:0;border-radius:50%;font-size:1rem}
.btn-play.active{animation:pp 1s ease-in-out infinite}
@keyframes pp{0%,100%{box-shadow:0 0 15px var(--fire-glow)}50%{box-shadow:0 0 30px rgba(255,100,50,0.3)}}
.bpm-c{display:flex;align-items:center;gap:5px}
.lbl{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-dim);letter-spacing:2px}
.bpm-v{font-family:'Anybody',sans-serif;font-size:1.3rem;font-weight:800;color:var(--fire);min-width:42px;text-align:center;text-shadow:0 0 8px var(--fire-glow)}
.bpm-b{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text-dim);cursor:pointer;font-size:0.8rem;transition:all 0.2s;font-family:'Oxanium'}
.bpm-b:hover{border-color:var(--fire);color:var(--fire)}
.sw-c{display:flex;align-items:center;gap:4px}
.sld{-webkit-appearance:none;width:50px;height:3px;background:var(--bg4);border-radius:2px;outline:none}
.sld::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--purple);border-radius:50%;cursor:pointer}

/* VISUALIZER */
.vis-w{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2px;margin-bottom:8px;overflow:hidden}
#vis{width:100%;height:55px;display:block;border-radius:6px}

/* STAGE */
.stage{display:flex;justify-content:space-around;align-items:flex-end;padding:10px 6px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;position:relative;overflow:hidden;min-height:115px}
.stage-floor{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire),var(--ember),var(--gold),transparent);opacity:0.3}
.stage-spot{position:absolute;bottom:0;width:60px;height:100%;background:radial-gradient(ellipse at bottom,var(--fire-glow),transparent 70%);opacity:0;transition:opacity 0.2s;pointer-events:none}
.stage-spot.on{opacity:0.6}

.character{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;z-index:2}
.character.hit{animation:ch 0.25s ease}
.character.idle-dance{animation:idleDance 2s ease-in-out infinite}
@keyframes ch{0%{transform:scale(1) translateY(0)}25%{transform:scale(1.18) translateY(-12px)}60%{transform:scale(0.95) translateY(2px)}100%{transform:scale(1) translateY(0)}}
@keyframes idleDance{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-2px) rotate(-1deg)}75%{transform:translateY(-2px) rotate(1deg)}}
.char-body{position:relative;width:50px;height:68px}
.char-name{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:1px;color:var(--text-dim);text-align:center;transition:all 0.2s;font-weight:500}
.character.hit .char-name{color:var(--cc);text-shadow:0 0 8px var(--cc)}
.hit-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:2px solid var(--cc);opacity:0;pointer-events:none}
.character.hit .hit-ring{animation:re 0.5s ease-out}
@keyframes re{0%{width:10px;height:10px;opacity:0.8}100%{width:70px;height:70px;opacity:0}}
.cp{position:absolute;inset:0;pointer-events:none;overflow:visible}
.spark{position:absolute;width:4px;height:4px;border-radius:50%;opacity:0;pointer-events:none}
.spark.active{animation:sf 0.6s ease-out forwards}
@keyframes sf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}

/* MPC PADS */
.pads-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.pads-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pads-title{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-dim);letter-spacing:3px}
.pads-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.pad{aspect-ratio:1;border-radius:8px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;overflow:hidden;user-select:none}
.pad:hover{border-color:var(--pad-c);transform:scale(1.03)}
.pad:active,.pad.hit{transform:scale(0.92);border-color:var(--pad-c);background:var(--pad-c);box-shadow:0 0 20px var(--pad-c)}
.pad:active::after,.pad.hit::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent)}
.pad-label{font-size:0.6rem;font-weight:700;color:var(--text);letter-spacing:1px;pointer-events:none}
.pad-key{font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-dim);pointer-events:none}

/* STEP NUMBERS & SEQUENCER */
.sn-row{display:flex;padding:0 0 2px;margin-left:96px;gap:2px}
.sn{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-dim);transition:color 0.15s}
.sn.cur{color:var(--fire);font-weight:700}
.track{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.track-i{width:92px;flex-shrink:0;display:flex;align-items:center;gap:5px;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:4px}
.track-c{width:3px;height:20px;border-radius:1px;flex-shrink:0}
.track-n{font-size:0.58rem;font-weight:600;letter-spacing:1px;flex:1}
.track-v{-webkit-appearance:none;width:28px;height:2px;background:var(--bg4);border-radius:2px;outline:none;flex-shrink:0}
.track-v::-webkit-slider-thumb{-webkit-appearance:none;width:7px;height:7px;background:var(--text-dim);border-radius:50%;cursor:pointer}
.steps{display:flex;flex:1;gap:2px}
.step{flex:1;height:24px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all 0.12s;position:relative;overflow:hidden}
.step:hover{border-color:rgba(255,255,255,0.1);background:var(--bg4)}
.step.on{border-color:var(--tc);background:var(--tc);box-shadow:0 0 6px var(--tg)}
.step.on::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent)}
.step.b4{margin-left:4px}
.step.playing{box-shadow:0 0 12px var(--tc),inset 0 0 10px rgba(255,255,255,0.08)!important;transform:scale(1.06)}

/* MELODY ROW */
.melody-section{margin-top:4px;padding:4px 0}
.melody-track{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.melody-i{width:92px;flex-shrink:0;display:flex;align-items:center;gap:5px;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:4px}
.melody-steps{display:flex;flex:1;gap:2px}
.melody-step{flex:1;height:24px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center;font-size:0.45rem;font-family:'DM Mono',monospace;color:var(--text-dim)}
.melody-step.on{border-color:var(--pink);background:var(--pink);box-shadow:0 0 6px rgba(255,107,157,0.3);color:#fff;font-weight:700}
.melody-step.b4{margin-left:4px}
.melody-step.playing{box-shadow:0 0 12px var(--pink)!important;transform:scale(1.06)}

/* PRESETS & SAVE */
.bottom-bar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.bar-section{flex:1;min-width:200px;display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.bar-label{font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-dim);letter-spacing:3px;margin-right:4px}
.preset-b{padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:var(--bg3);color:var(--text-dim);font-family:'Oxanium';font-size:0.6rem;font-weight:500;cursor:pointer;transition:all 0.25s;letter-spacing:1px}
.preset-b:hover{border-color:var(--fire);color:var(--fire)}

.footer{text-align:center;padding:16px 0 8px;font-size:0.6rem;color:var(--text-dim)}
.footer a{color:var(--fire);text-decoration:none}

.fi{opacity:0;transform:translateY(10px);animation:fadeIn 0.4s ease forwards}
.fi2{animation-delay:.08s}.fi3{animation-delay:.12s}.fi4{animation-delay:.16s}.fi5{animation-delay:.2s}.fi6{animation-delay:.24s}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){.main{padding:8px 6px}.track-i,.melody-i{width:62px}.track-n{font-size:0.5rem}.track-v{display:none}.step,.melody-step{height:20px}.brand-sub{display:none}.char-body{width:36px;height:50px}.stage{min-height:85px}.pads-grid{grid-template-columns:repeat(4,1fr)}.combo-display{top:60px;right:10px}.combo-count{font-size:1.5rem}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="party-flash" id="partyFlash"></div>

<!-- COMBO -->
<div class="combo-display" id="comboDisplay">
    <div class="combo-count" id="comboCount"></div>
    <div class="combo-label" id="comboLabel"></div>
</div>

<div class="topbar">
    <div class="brand"><div class="brand-icon">🥁</div><span class="brand-name">BEATFORGE</span><span class="brand-sub">ULTIMATE</span></div>
    <div class="top-btns">
        <button class="theme-btn active" data-theme="neon">NEON</button>
        <button class="theme-btn" data-theme="retro">RETRO</button>
        <button class="theme-btn" data-theme="matrix">MATRIX</button>
        <button class="theme-btn" data-theme="vapor">VAPOR</button>
        <a href="https://drame31.github.io" class="top-link">← PORTFOLIO</a>
    </div>
</div>

<div class="main">
    <!-- TRANSPORT -->
    <div class="transport fi">
        <div class="tg">
            <button class="btn btn-play" id="playBtn">▶</button>
            <div class="bpm-c"><span class="lbl">BPM</span><button class="bpm-b" id="bpmD">−</button><span class="bpm-v" id="bpmV">128</span><button class="bpm-b" id="bpmU">+</button></div>
        </div>
        <div class="tg">
            <div class="sw-c"><span class="lbl">SWING</span><input type="range" class="sld" id="swS" min="0" max="80" value="0"><span class="lbl" id="swV" style="min-width:22px">0%</span></div>
        </div>
        <div class="tg">
            <button class="btn" id="partyBtn">🎆 PARTY</button>
            <button class="btn" id="clearBtn">CLEAR</button>
            <button class="btn" id="randomBtn">RANDOM</button>
        </div>
    </div>

    <!-- VISUALIZER -->
    <div class="vis-w fi fi2"><canvas id="vis"></canvas></div>

    <!-- STAGE -->
    <div class="stage fi fi3" id="stage"><div class="stage-floor"></div></div>

    <!-- MPC PADS -->
    <div class="pads-section fi fi3">
        <div class="pads-header"><span class="pads-title">◆ LIVE PADS</span><span class="pads-title">KEYS: A S D F G H J K</span></div>
        <div class="pads-grid" id="padsGrid"></div>
    </div>

    <!-- SEQUENCER -->
    <div class="sn-row fi fi4" id="snRow"></div>
    <div id="seq" class="fi fi4"></div>

    <!-- MELODY -->
    <div class="melody-section fi fi5" id="melodySection"></div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar fi fi6">
        <div class="bar-section">
            <span class="bar-label">PATTERNS</span>
            <button class="preset-b" data-p="hiphop">Hip Hop</button>
            <button class="preset-b" data-p="house">House</button>
            <button class="preset-b" data-p="dnb">D&B</button>
            <button class="preset-b" data-p="trap">Trap</button>
            <button class="preset-b" data-p="reggaeton">Reggaeton</button>
            <button class="preset-b" data-p="rock">Rock</button>
        </div>
        <div class="bar-section">
            <span class="bar-label">SAVE</span>
            <button class="preset-b" id="save1" data-slot="1">SLOT 1</button>
            <button class="preset-b" id="save2" data-slot="2">SLOT 2</button>
            <button class="preset-b" id="save3" data-slot="3">SLOT 3</button>
            <span class="bar-label" style="margin-left:6px">LOAD</span>
            <button class="preset-b" id="load1" data-slot="1">SLOT 1</button>
            <button class="preset-b" id="load2" data-slot="2">SLOT 2</button>
            <button class="preset-b" id="load3" data-slot="3">SLOT 3</button>
        </div>
    </div>
</div>
<footer class="footer"><p>Built by <a href="https://drame31.github.io">Derek Muñoz Solís</a> — BeatForge Ultimate</p></footer>

<script>

const AC=window.AudioContext||window.webkitAudioContext;let ax;
function ea(){if(!ax)ax=new AC();if(ax.state==='suspended')ax.resume()}
function noise(dur){const b=ax.createBuffer(1,ax.sampleRate*dur,ax.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b}
function pK(t,v){const o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(30,t+.12);g.gain.setValueAtTime(v*1.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.start(t);o.stop(t+.35)}
function pS(t,v){const n=ax.createBufferSource();n.buffer=noise(.15);const ng=ax.createGain(),f=ax.createBiquadFilter();f.type='highpass';f.frequency.value=1e3;n.connect(f);f.connect(ng);ng.connect(ax.destination);ng.gain.setValueAtTime(v*.8,t);ng.gain.exponentialRampToValueAtTime(.001,t+.15);n.start(t);n.stop(t+.15);const o=ax.createOscillator(),og=ax.createGain();o.connect(og);og.connect(ax.destination);o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+.07);og.gain.setValueAtTime(v*.7,t);og.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.1)}
function pH(t,v,op=false){const dur=op?.25:.06,n=ax.createBufferSource();n.buffer=noise(dur);const g=ax.createGain(),hp=ax.createBiquadFilter();hp.type='highpass';hp.frequency.value=op?5e3:7e3;n.connect(hp);hp.connect(g);g.connect(ax.destination);g.gain.setValueAtTime(v*.5,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);n.start(t);n.stop(t+dur)}
function pC(t,v){for(let i=0;i<3;i++){const tt=t+i*.01,n=ax.createBufferSource();n.buffer=noise(.04);const g=ax.createGain(),bp=ax.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2500;bp.Q.value=3;n.connect(bp);bp.connect(g);g.connect(ax.destination);g.gain.setValueAtTime(v*.6,tt);g.gain.exponentialRampToValueAtTime(.001,tt+.08);n.start(tt);n.stop(tt+.08)}}
function pT(t,v,fr=120){const o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.setValueAtTime(fr,t);o.frequency.exponentialRampToValueAtTime(fr*.4,t+.2);g.gain.setValueAtTime(v*.9,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25)}
function pP(t,v){const o=ax.createOscillator();o.type='triangle';const g=ax.createGain();o.connect(g);g.connect(ax.destination);o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(300,t+.04);g.gain.setValueAtTime(v*.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06)}
function pM(t,v,freq){const o=ax.createOscillator();o.type='sine';const g=ax.createGain();const f2=ax.createBiquadFilter();f2.type='lowpass';f2.frequency.value=2000;o.connect(f2);f2.connect(g);g.connect(ax.destination);o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(v*.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}

function updateCombo(hitCount){
    if(hitCount>0){combo+=hitCount;maxCombo=Math.max(maxCombo,combo)}else{combo=Math.max(0,combo-1)}
    const el=document.getElementById('comboCount');
    const lbl=document.getElementById('comboLabel');
    if(combo>=5){
        el.textContent=combo+'x';
        el.style.color=getComboColor();
        el.style.textShadow=`0 0 20px ${getComboColor()}40`;
        el.style.transform=`scale(${1+Math.min(combo/100,0.5)})`;
        const cl=getComboLabel();
        if(cl){lbl.textContent=cl.text;lbl.style.color=cl.color;lbl.classList.add('show');
            if(combo%20===0)spawnComboText(cl.text,cl.color);
        }
    }else{el.textContent='';lbl.classList.remove('show')}
}
function getComboColor(){for(let i=COMBO_LABELS.length-1;i>=0;i--)if(combo>=COMBO_LABELS[i].min)return COMBO_LABELS[i].color;return'#fff'}
function getComboLabel(){for(let i=COMBO_LABELS.length-1;i>=0;i--)if(combo>=COMBO_LABELS[i].min)return COMBO_LABELS[i];return null}
function spawnComboText(text,color){
    const el=document.createElement('div');el.className='combo-text';el.textContent=text;el.style.color=color;el.style.top='-30px';el.style.textShadow=`0 0 10px ${color}`;
    document.getElementById('comboDisplay').appendChild(el);setTimeout(()=>el.remove(),800);
}

function triggerParty(intensity){

    const colors=['#ff6432','#00e5ff','#b44dff','#00ff88','#ffd033','#ff2d55'];

    flash.classList.remove('active');void flash.offsetWidth;flash.classList.add('active');
    if(intensity>3){for(let i=0;i<intensity*2;i++){
        const p=document.createElement('div');p.className='party-particle';
        p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
        p.style.width=p.style.height=(4+Math.random()*8)+'px';

        p.style.setProperty('--px',(Math.random()*200-100)+'px');
        p.style.setProperty('--py',(Math.random()*200-100)+'px');

    }}
}

    const sp=document.getElementById(`spot-${i}`);if(sp){sp.classList.add('on');setTimeout(()=>sp.classList.remove('on'),200)}
    const co=document.getElementById(`sp-${i}`),cl=TK[i].color;
    for(let j=0;j<6;j++){const s=document.createElement('div');s.className='spark';s.style.background=cl;s.style.left='50%';s.style.top='30%';s.style.setProperty('--sx',(Math.random()*60-30)+'px');s.style.setProperty('--sy',(Math.random()*-50-10)+'px');co.appendChild(s);requestAnimationFrame(()=>s.classList.add('active'));setTimeout(()=>s.remove(),600)}
    setTimeout(()=>ch.classList.remove('hit'),300);
}

function buildPads(){
    const g=document.getElementById('padsGrid');g.innerHTML='';
    const keys='ASDFGHJK';
    TK.forEach((tk,i)=>{
        const p=document.createElement('div');p.className='pad';p.style.setProperty('--pad-c',tk.color);
        p.innerHTML=`<span class="pad-label" style="color:${tk.color}">${tk.name}</span><span class="pad-key">${keys[i]}</span>`;
        p.addEventListener('mousedown',()=>{ea();tk.fn(ax.currentTime,vl[i]);trigChar(i);p.classList.add('hit');setTimeout(()=>p.classList.remove('hit'),150)});
        g.appendChild(p);
    });
}

function buildSN(){const c=document.getElementById('snRow');c.innerHTML='';for(let i=0;i<NS;i++){const e=document.createElement('div');e.className='sn';e.textContent=i+1;e.id=`sn-${i}`;c.appendChild(e)}}

function buildSeq(){
    const sq=document.getElementById('seq');sq.innerHTML='';
    TK.forEach((tk,ti)=>{
        const r=document.createElement('div');r.className='track';
        const info=document.createElement('div');info.className='track-i';
        info.innerHTML=`<div class="track-c" style="background:${tk.color}"></div><span class="track-n" style="color:${tk.color}">${tk.name}</span><input type="range" class="track-v" min="0" max="100" value="80" data-t="${ti}">`;
        r.appendChild(info);
        const sd=document.createElement('div');sd.className='steps';
        for(let si=0;si<NS;si++){
            const st=document.createElement('div');st.className='step'+(si%4===0&&si>0?' b4':'');
            st.dataset.t=ti;st.dataset.s=si;st.style.setProperty('--tc',tk.color);st.style.setProperty('--tg',tk.color+'40');
            st.addEventListener('click',()=>{gr[ti][si]=!gr[ti][si];st.classList.toggle('on',gr[ti][si]);if(gr[ti][si]){ea();tk.fn(ax.currentTime,vl[ti]);trigChar(ti)}});
            sd.appendChild(st);
        }
        r.appendChild(sd);sq.appendChild(r);
    });
    document.querySelectorAll('.track-v').forEach(s=>{s.addEventListener('input',e=>{vl[parseInt(e.target.dataset.t)]=e.target.value/100})});
}

function buildMelody(){
    const ms=document.getElementById('melodySection');ms.innerHTML='';
    const r=document.createElement('div');r.className='melody-track';
    const info=document.createElement('div');info.className='melody-i';
    info.innerHTML=`<div class="track-c" style="background:#ff6b9d"></div><span class="track-n" style="color:#ff6b9d">MELODY</span>`;
    r.appendChild(info);
    const sd=document.createElement('div');sd.className='melody-steps';
    for(let si=0;si<NS;si++){
        const st=document.createElement('div');st.className='melody-step'+(si%4===0&&si>0?' b4':'');
        st.dataset.s=si;st.textContent='·';
        st.addEventListener('click',()=>{
            if(MELODY_NOTES[si]===null){
                MELODY_NOTES[si]='C4';st.classList.add('on');st.textContent='C4';
            }else{
                const idx=NOTES.indexOf(MELODY_NOTES[si]);
                if(idx<NOTES.length-1){MELODY_NOTES[si]=NOTES[idx+1];st.textContent=NOTES[idx+1]}
                else{MELODY_NOTES[si]=null;st.classList.remove('on');st.textContent='·'}
            }
            if(MELODY_NOTES[si]){ea();pM(ax.currentTime,melodyVol,NOTE_FREQ[MELODY_NOTES[si]])}
        });
        sd.appendChild(st);
    }
    r.appendChild(sd);ms.appendChild(r);
}

// ═══════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════
function gsd(){return 60/bpm/4}
function sched(){
    if(!pl)return;const now=ax.currentTime;
    while(nst<now+.1){
        cs=(cs+1)%NS;const so=(cs%2===1)?(sw/100)*gsd()*.5:0,time=nst+so;
        let hitCount=0;
        gr.forEach((row,ti)=>{if(row[cs]){TK[ti].fn(time,vl[ti]);hitCount++;
            vdTracks[ti].push(0.8+Math.random()*.2);if(vdTracks[ti].length>64)vdTracks[ti].shift();
            const dl=Math.max(0,(time-now)*1e3);setTimeout(()=>trigChar(ti),dl);
        }else{vdTracks[ti].push(0.02);if(vdTracks[ti].length>64)vdTracks[ti].shift()}});
        // Melody
        if(MELODY_NOTES[cs]!==null){pM(time,melodyVol,NOTE_FREQ[MELODY_NOTES[cs]]);hitCount++}
        if(hitCount>0)vd.push(.7+Math.random()*.3);else vd.push(.03);if(vd.length>64)vd.shift();
        const sc=cs,d=Math.max(0,(time-now)*1e3);
        setTimeout(()=>{uh(sc);updateCombo(hitCount);triggerParty(hitCount)},d);
        nst+=gsd();
    }
    requestAnimationFrame(sched);
}

function uh(s){
    document.querySelectorAll('.step.playing,.melody-step.playing').forEach(e=>e.classList.remove('playing'));
    document.querySelectorAll(`.step[data-s="${s}"]`).forEach(e=>e.classList.add('playing'));
    document.querySelectorAll(`.melody-step[data-s="${s}"]`).forEach(e=>e.classList.add('playing'));
    document.querySelectorAll('.sn.cur').forEach(e=>e.classList.remove('cur'));
    const sn=document.getElementById(`sn-${s}`);if(sn)sn.classList.add('cur');
}

function startP(){ea();pl=true;cs=-1;combo=0;nst=ax.currentTime+.05;document.getElementById('playBtn').classList.add('active');document.getElementById('playBtn').textContent='⏹';sched()}
function stopP(){pl=false;cs=-1;document.getElementById('playBtn').classList.remove('active');document.getElementById('playBtn').textContent='▶';document.querySelectorAll('.step.playing,.melody-step.playing').forEach(e=>e.classList.remove('playing'));document.querySelectorAll('.sn.cur').forEach(e=>e.classList.remove('cur'))}

// ═══════════════════════════════════════════
// VISUALIZER (Multi-color per track)
// ═══════════════════════════════════════════
const vc=document.getElementById('vis'),vx=vc.getContext('2d');
function rv(){vc.width=vc.offsetWidth*2;vc.height=vc.offsetHeight*2}rv();window.addEventListener('resize',rv);
function dv(){
    const w=vc.width,h=vc.height;vx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg2').trim()||'#0e0e14';vx.fillRect(0,0,w,h);
    const bw=w/64;
    // Draw per-track colored bars stacked
    for(let i=0;i<64;i++){
        let y=h;
        TK.forEach((tk,ti)=>{
            const v=vdTracks[ti][i]||0;
            const bh=v*h/(TK.length)*1.5;
            y-=bh;
            vx.fillStyle=tk.color+Math.floor(v*200).toString(16).padStart(2,'0');
            vx.fillRect(i*bw+1,y,bw-2,bh);
        });
    }
    // Decay
    vdTracks.forEach(arr=>{for(let i=0;i<arr.length;i++)arr[i]*=.9});
    requestAnimationFrame(dv);
}dv();

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
document.getElementById('playBtn').addEventListener('click',()=>{if(pl)stopP();else startP()});
document.getElementById('bpmU').addEventListener('click',()=>{bpm=Math.min(200,bpm+2);document.getElementById('bpmV').textContent=bpm});
document.getElementById('bpmD').addEventListener('click',()=>{bpm=Math.max(60,bpm-2);document.getElementById('bpmV').textContent=bpm});
document.getElementById('swS').addEventListener('input',e=>{sw=parseInt(e.target.value);document.getElementById('swV').textContent=sw+'%'});
document.getElementById('clearBtn').addEventListener('click',()=>{gr=TK.map(()=>new Array(NS).fill(false));MELODY_NOTES.fill(null);document.querySelectorAll('.step,.melody-step').forEach(e=>{e.classList.remove('on');if(e.classList.contains('melody-step'))e.textContent='·'})});
document.getElementById('randomBtn').addEventListener('click',()=>{gr=TK.map((_,ti)=>{const d=ti<2?.2:ti<4?.3:.15;return new Array(NS).fill(false).map(()=>Math.random()<d)});rg()});
document.getElementById('partyBtn').addEventListener('click',function(){partyMode=!partyMode;this.classList.toggle('active',partyMode)});

// Themes
document.querySelectorAll('.theme-btn').forEach(b=>{b.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    document.body.className='';if(b.dataset.theme!=='neon')document.body.classList.add('theme-'+b.dataset.theme);
})});

// Save/Load
document.querySelectorAll('[id^="save"]').forEach(b=>{b.addEventListener('click',()=>{
    const data={gr,melody:MELODY_NOTES,bpm,sw};
    try{localStorage.setItem('bf_slot_'+b.dataset.slot,JSON.stringify(data));b.style.color='var(--green)';setTimeout(()=>b.style.color='',500)}catch(e){}
})});
document.querySelectorAll('[id^="load"]').forEach(b=>{b.addEventListener('click',()=>{
    try{const d=JSON.parse(localStorage.getItem('bf_slot_'+b.dataset.slot));
    if(d){gr=d.gr;bpm=d.bpm||128;sw=d.sw||0;document.getElementById('bpmV').textContent=bpm;
    if(d.melody)d.melody.forEach((n,i)=>{MELODY_NOTES[i]=n});rg();rmg();b.style.color='var(--green)';setTimeout(()=>b.style.color='',500)}}catch(e){}
})});

function rg(){document.querySelectorAll('.step').forEach(e=>{const ti=parseInt(e.dataset.t),si=parseInt(e.dataset.s);e.classList.toggle('on',gr[ti][si])})}
function rmg(){document.querySelectorAll('.melody-step').forEach(e=>{const si=parseInt(e.dataset.s);const n=MELODY_NOTES[si];e.classList.toggle('on',n!==null);e.textContent=n||'·'})}
function lp(n){if(!PR[n])return;gr=PR[n].map(r=>r.map(v=>!!v));rg()}

document.querySelectorAll('.preset-b[data-p]').forEach(b=>{b.addEventListener('click',()=>{lp(b.dataset.p);if(!pl)startP()})});

// Keyboard
const PAD_KEYS={KeyA:0,KeyS:1,KeyD:2,KeyF:3,KeyG:4,KeyH:5,KeyJ:6,KeyK:7};
document.addEventListener('keydown',e=>{
    if(e.code==='Space'){e.preventDefault();if(pl)stopP();else startP()}
    if(PAD_KEYS[e.code]!==undefined){
        const i=PAD_KEYS[e.code];ea();TK[i].fn(ax.currentTime,vl[i]);trigChar(i);
        const pads=document.querySelectorAll('.pad');pads[i]?.classList.add('hit');setTimeout(()=>pads[i]?.classList.remove('hit'),150);
    }
});

// INIT
buildStage();buildPads();buildSN();buildSeq();buildMelody();lp('hiphop');
</script>
</body>
</html>
